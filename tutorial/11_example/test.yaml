name: test

channels:
  - conda-forge
  - bioconda
  - defaults
  - nvidia

dependencies:
  # Python core
  - python=3.11
  - pip

  # Scientific stack (compiled libs)
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - numba
  - pytables
  - hdf5
  - xarray
  - dask
  - dask-jobqueue

  # GPU / deep learning (large downloads)
  - pytorch
  - torchvision
  - torchaudio
  - cudatoolkit

  # Bioinformatics tools (compiled, heavy deps)
  - snakemake
  - samtools
  - bcftools
  - bwa
  - hisat2
  - star
  - salmon
  - kallisto
  - gatk4

  # R + Bioconductor (very dependency-heavy)
  - r-base
  - r-tidyverse
  - bioconductor-deseq2
  - bioconductor-edger
  - bioconductor-limma

  # Utilities
  - graphviz
  - openjdk
  - curl
  - wget

  - pip:
      - jupyterlab
      - notebook
      - plotly
      - scanpy