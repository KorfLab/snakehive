name: test

channels:
  - conda-forge
  - bioconda

dependencies:
  # Core Python
  - python=3.11
  - pip

  # Data science stack
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn

  # Bioinformatics tools
  - snakemake
  - samtools
  - bwa
  - bedtools
  - fastqc

  # System / utility packages
  - curl
  - wget

  # Pip-only packages
  - pip:
      - requests
      - rich